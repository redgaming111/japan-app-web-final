<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Flashcard Cơ Bản</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .flash-container{
      display:flex;
      flex-wrap:wrap;
      gap:20px;
      justify-content:center;
      margin-top:30px;
    }

    .flashcard{
      width:120px;
      height:150px;
      perspective:1000px;
      cursor:pointer;
    }

    .card-inner{
      width:100%;
      height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:0.5s;
    }

    .flashcard.flip .card-inner{
      transform:rotateY(180deg);
    }

    .card-front,
    .card-back{
      position:absolute;
      width:100%;
      height:100%;
      backface-visibility:hidden;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:32px;
      font-weight:bold;
      background:white;
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .card-back{
      background:#ff8fcf;
      color:white;
      transform:rotateY(180deg);
      font-size:18px;
    }

    .back-btn{
      margin-top:20px;
      padding:10px 16px;
      border:none;
      border-radius:8px;
      background:#2e7d32;
      color:white;
      cursor:pointer;
    }
  </style>
</head>
<body>

<h2 class="titleD">Flashcard Bảng Chữ Cái</h2>

<button class="back-btn" onclick="goBackkana()">⬅ Quay lại</button>

<div class="flash-container" id="flashContainer"></div>

<script src="js/cobanflashcard.js"></script>

</body>
</html>
