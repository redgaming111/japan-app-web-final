<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Flashcard JLPT</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<button class="back-btn" onclick="goBack()">
  ← Trở về học ngữ pháp
</button>

<h2 class="titleD">🃏 Flashcard Học Tiếng Nhật</h2>

<select id="level">
  <option value="">-- Chọn cấp độ --</option>
  <option value="N5">N5</option>
  <option value="N4">N4</option>
  <option value="N3">N3</option>
</select>

<select id="category">
  <option value="">-- Chọn nội dung --</option>
  <option value="vocab">Từ vựng</option>
  <option value="grammar">Ngữ pháp</option>
  <option value="kanji">Kanji</option>
</select>

<button id="startFlashcard" class="flashcard-btn mc-btn">
  ▶ Bắt đầu học
</button>

<button id="startStarFlashcard" class="flashcard-btn mc-btn">
  ⭐ Học từ đã đánh dấu
</button>


<div class="flashcard hidden" id="flashcard">
  <div class="card-inner">
    <div class="card-front" id="cardFront"></div>
    <div class="card-back" id="cardBack"></div>
  </div>
</div>

<div class="flashcard-controls hidden" id="controls">
  <button id="prevCard" class="nav-btn">
    ← Trước
  </button>

  <span class="card-counter" id="cardCounter"></span>

  <button id="nextCard" class="nav-btn">
    Sau →
  </button>
</div>


<script src="js/dataN5.js"></script>
<script src="js/dataN4.js"></script>
<script src="js/dataN3.js"></script>
<script src="js/flashcard.js"></script>
<script src="js/ui.js"></script>

<script>
function goBack() {
  window.location.href = "index.html";
}
</script>


</body>
</html>
